services:
  - type: web
    name: carbon-review-backend
    env: python
    plan: free
    branch: main
    buildCommand: pip install -r backend/requirements.txt && cd backend && python manage.py collectstatic --noinput
    startCommand: bash start-backend.sh
    envVars:
      - key: DJANGO_SECRET_KEY
        value: "unsafe-local-secret"
      - key: DEBUG
        value: "0"
    autoDeploy: true

  - type: static
    name: carbon-review-frontend
    env: node
    plan: free
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: "https://<your-backend-render-url>/api"
    autoDeploy: true
