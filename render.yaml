services:
  - type: web
    name: carbon-review-backend
    env: python
    plan: free
    branch: main
    buildCommand: pip install -r backend/requirements.txt && cd backend && python manage.py collectstatic --noinput
    startCommand: bash start-backend.sh
    envVars:
      - key: DJANGO_SECRET_KEY
        value: "unsafe-local-secret"
      - key: DEBUG
        value: "0"
    autoDeploy: true
